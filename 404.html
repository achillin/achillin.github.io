<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mastermind</title>
    <script>
      // GitHub Pages serves this for every unknown path (SPA deep links,
      // reloads on /new_game, ...). Tuck the intended path into ?p= and
      // bounce to /, where index.html restores it before the router boots.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?p=' +
        encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
