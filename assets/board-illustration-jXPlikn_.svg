<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 680" role="img" aria-label="Mastermind game board">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.35" stop-color="#0780a8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#045e7a" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="rowBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a3f7a"/>
      <stop offset="1" stop-color="#153465"/>
    </linearGradient>
    <linearGradient id="submit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#63c9ef"/>
      <stop offset="1" stop-color="#0aafe6"/>
    </linearGradient>
    <radialGradient id="stageGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb74d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffb74d" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- warm stage light pooled under the board -->
  <ellipse cx="280" cy="600" rx="240" ry="60" fill="url(#stageGlow)"/>

  <!-- ambient sparks -->
  <circle cx="70" cy="120" r="5" fill="#0aafe6" opacity="0.5"/>
  <circle cx="500" cy="90" r="4" fill="#a7e8f9" opacity="0.55"/>
  <circle cx="510" cy="420" r="6" fill="#7b1fa2" opacity="0.45"/>
  <circle cx="46" cy="470" r="4" fill="#7b1fa2" opacity="0.4"/>
  <circle cx="480" cy="560" r="4" fill="#ffb74d" opacity="0.5"/>

  <g transform="rotate(-10 280 340)">
    <!-- platform under the board -->
    <rect x="152" y="66" width="256" height="560" rx="30" fill="#0a1f30" opacity="0.85"/>
    <!-- board glass face -->
    <rect x="146" y="52" width="256" height="560" rx="30" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>

    <!-- secret row -->
    <rect x="170" y="72" width="208" height="40" rx="14" fill="#0a0f1c" opacity="0.9"/>
    <g fill="#c9ced6" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">
      <circle cx="204" cy="92" r="13" fill="#22364c"/>
      <circle cx="251" cy="92" r="13" fill="#22364c"/>
      <circle cx="298" cy="92" r="13" fill="#22364c"/>
      <circle cx="345" cy="92" r="13" fill="#22364c"/>
      <text x="204" y="99">?</text><text x="251" y="99">?</text><text x="298" y="99">?</text><text x="345" y="99">?</text>
    </g>

    <!-- guess rows: two solved-looking colourful rows, the rest waiting -->
    <g>
      <!-- row template: band + 4 pegs + 2x2 feedback dots -->
      <g transform="translate(0,126)">
        <rect x="166" y="0" width="216" height="46" rx="16" fill="url(#rowBand)"/>
        <circle cx="198" cy="23" r="15" fill="#c62828"/>
        <circle cx="242" cy="23" r="15" fill="#fbc02d"/>
        <circle cx="286" cy="23" r="15" fill="#1565c0"/>
        <circle cx="330" cy="23" r="15" fill="#388e3c"/>
        <circle cx="362" cy="15" r="4" fill="#0a0f1c"/><circle cx="374" cy="15" r="4" fill="#0a0f1c"/>
        <circle cx="362" cy="30" r="4" fill="#f4f6f8"/><circle cx="374" cy="30" r="4" fill="#0a0f1c"/>
      </g>
      <g transform="translate(0,182)">
        <rect x="166" y="0" width="216" height="46" rx="16" fill="url(#rowBand)"/>
        <circle cx="198" cy="23" r="15" fill="#7b1fa2"/>
        <circle cx="242" cy="23" r="15" fill="#f57c00"/>
        <circle cx="286" cy="23" r="15" fill="#c62828"/>
        <circle cx="330" cy="23" r="15" fill="#1565c0"/>
        <circle cx="362" cy="15" r="4" fill="#f4f6f8"/><circle cx="374" cy="15" r="4" fill="#f4f6f8"/>
        <circle cx="362" cy="30" r="4" fill="#f4f6f8"/><circle cx="374" cy="30" r="4" fill="#0a0f1c"/>
      </g>
      <g transform="translate(0,238)">
        <rect x="166" y="0" width="216" height="46" rx="16" fill="url(#rowBand)"/>
        <circle cx="198" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="242" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="286" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="330" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="362" cy="15" r="4" fill="#22364c"/><circle cx="374" cy="15" r="4" fill="#22364c"/>
        <circle cx="362" cy="30" r="4" fill="#22364c"/><circle cx="374" cy="30" r="4" fill="#22364c"/>
      </g>
      <g transform="translate(0,294)">
        <rect x="166" y="0" width="216" height="46" rx="16" fill="url(#rowBand)"/>
        <circle cx="198" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="242" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="286" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="330" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="362" cy="15" r="4" fill="#22364c"/><circle cx="374" cy="15" r="4" fill="#22364c"/>
        <circle cx="362" cy="30" r="4" fill="#22364c"/><circle cx="374" cy="30" r="4" fill="#22364c"/>
      </g>
      <g transform="translate(0,350)">
        <rect x="166" y="0" width="216" height="46" rx="16" fill="url(#rowBand)"/>
        <circle cx="198" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="242" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="286" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="330" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="362" cy="15" r="4" fill="#22364c"/><circle cx="374" cy="15" r="4" fill="#22364c"/>
        <circle cx="362" cy="30" r="4" fill="#22364c"/><circle cx="374" cy="30" r="4" fill="#22364c"/>
      </g>
      <g transform="translate(0,406)">
        <rect x="166" y="0" width="216" height="46" rx="16" fill="url(#rowBand)"/>
        <circle cx="198" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="242" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="286" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="330" cy="23" r="15" fill="#f4f6f8"/>
        <circle cx="362" cy="15" r="4" fill="#22364c"/><circle cx="374" cy="15" r="4" fill="#22364c"/>
        <circle cx="362" cy="30" r="4" fill="#22364c"/><circle cx="374" cy="30" r="4" fill="#22364c"/>
      </g>
    </g>

    <!-- colour palette (one straight line — the group rotation adds the tilt) -->
    <g transform="translate(0,470)">
      <circle cx="192" cy="18" r="11" fill="#c62828"/>
      <circle cx="225" cy="18" r="11" fill="#1565c0"/>
      <circle cx="258" cy="18" r="11" fill="#388e3c"/>
      <circle cx="291" cy="18" r="11" fill="#fbc02d"/>
      <circle cx="324" cy="18" r="11" fill="#f57c00"/>
      <circle cx="357" cy="18" r="11" fill="#7b1fa2"/>
    </g>

    <!-- submit pill -->
    <g transform="translate(0,520)">
      <rect x="200" y="0" width="150" height="52" rx="26" fill="url(#submit)" filter="url(#soft)" opacity="0.65"/>
      <rect x="200" y="0" width="150" height="52" rx="26" fill="url(#submit)"/>
      <text x="275" y="34" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="2" text-anchor="middle">SUBMIT</text>
    </g>
  </g>
</svg>
